<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stopwatch</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #E8002D;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666680;
    --green: #00e676;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 2rem 1rem;
  }

  /* header */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .header-label {
    font-size: 0.75rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  .header-title {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
  }

  /* main card */
  .watch-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }

  /* circular display */
  .circle-wrap {
    position: relative;
    width: 240px;
    height: 240px;
  }

  .circle-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .circle-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 6;
  }

  .circle-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-dasharray: 659;
    stroke-dashoffset: 659;
    transition: stroke-dashoffset 0.1s linear;
  }

  .circle-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 2.8rem;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .ms-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 3px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    margin-top: 10px;
    transition: background 0.3s;
  }

  .status-dot.running { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.paused  { background: var(--accent2); }

  /* buttons */
  .btn-row {
    display: flex;
    gap: 1rem;
    width: 100%;
    justify-content: center;
  }

  .btn {
    flex: 1;
    max-width: 130px;
    padding: 0.75rem 0;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }

  .btn:hover { background: #22222f; border-color: #44445a; }
  .btn:active { transform: scale(0.97); }

  .btn-start {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn-start:hover { background: #c8001f; border-color: #c8001f; }

  .btn-start.running {
    background: var(--accent2);
    border-color: var(--accent2);
  }

  .btn-start.running:hover { background: #e05520; border-color: #e05520; }

  .btn-lap { border-color: var(--border); }
  .btn-lap:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-lap:disabled:hover { background: var(--card); border-color: var(--border); transform: none; }

  /* lap section */
  .lap-section {
    width: 100%;
  }

  .lap-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.75rem;
  }

  .lap-title {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .lap-count {
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .lap-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .lap-list::-webkit-scrollbar { width: 4px; }
  .lap-list::-webkit-scrollbar-track { background: transparent; }
  .lap-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .lap-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 0.75rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .lap-num {
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .lap-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: var(--text);
  }

  .lap-diff {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .lap-item.fastest .lap-time { color: var(--green); }
  .lap-item.fastest .lap-num::after { content: ' best'; color: var(--green); }
  .lap-item.slowest .lap-time { color: var(--accent); }
  .lap-item.slowest .lap-num::after { content: ' slow'; color: var(--accent); }

  .lap-empty {
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  /* stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.75rem;
    width: 100%;
  }

  .stat-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    text-align: center;
  }

  .stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: var(--text);
    line-height: 1;
  }

  .stat-key {
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  @media (max-width: 500px) {
    .time-display { font-size: 2.2rem; }
    .circle-wrap { width: 200px; height: 200px; }
  }
</style>
</head>
<body>

<header>
  <p class="header-label">Precision Timer</p>
  <h1 class="header-title">Stopwatch</h1>
</header>

<div class="watch-card">

  <!-- circular timer display -->
  <div class="circle-wrap">
    <svg class="circle-svg" viewBox="0 0 220 220">
      <circle class="circle-bg" cx="110" cy="110" r="105"/>
      <circle class="circle-progress" id="progress-ring" cx="110" cy="110" r="105"/>
    </svg>
    <div class="circle-inner">
      <div class="time-display" id="time-display">00:00:00</div>
      <div class="ms-display" id="ms-display">.000</div>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </div>

  <!-- buttons -->
  <div class="btn-row">
    <button class="btn btn-lap" id="btn-lap" disabled onclick="recordLap()">Lap</button>
    <button class="btn btn-start" id="btn-start" onclick="toggleStart()">Start</button>
    <button class="btn btn-reset" id="btn-reset" onclick="resetWatch()">Reset</button>
  </div>

  <!-- stats -->
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="stat-laps">0</div>
      <div class="stat-key">Laps</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-best">--</div>
      <div class="stat-key">Best</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-avg">--</div>
      <div class="stat-key">Avg</div>
    </div>
  </div>

  <!-- lap list -->
  <div class="lap-section">
    <div class="lap-header">
      <span class="lap-title">Lap Times</span>
      <span class="lap-count" id="lap-count"></span>
    </div>
    <div class="lap-list" id="lap-list">
      <div class="lap-empty" id="lap-empty">No laps recorded yet</div>
    </div>
  </div>

</div>

<script>
  let running = false;
  let startTime = 0;
  let elapsed = 0;
  let lapStart = 0;
  let laps = [];
  let raf = null;

  const timeDisplay = document.getElementById('time-display');
  const msDisplay = document.getElementById('ms-display');
  const statusDot = document.getElementById('status-dot');
  const btnStart = document.getElementById('btn-start');
  const btnLap = document.getElementById('btn-lap');
  const lapList = document.getElementById('lap-list');
  const lapEmpty = document.getElementById('lap-empty');
  const ring = document.getElementById('progress-ring');
  const statLaps = document.getElementById('stat-laps');
  const statBest = document.getElementById('stat-best');
  const statAvg = document.getElementById('stat-avg');
  const lapCount = document.getElementById('lap-count');

  const CIRCUMFERENCE = 2 * Math.PI * 105;

  function pad(n, len) { return String(Math.floor(n)).padStart(len, '0'); }

  function formatTime(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const mil = ms % 1000;
    return { main: pad(h,2) + ':' + pad(m,2) + ':' + pad(s,2), ms: '.' + pad(mil,3) };
  }

  function formatLapTime(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const mil = Math.floor(ms % 1000);
    return pad(m,2) + ':' + pad(s,2) + '.' + pad(mil,3);
  }

  function updateRing(ms) {
    const seconds = (ms / 1000) % 60;
    const offset = CIRCUMFERENCE - (seconds / 60) * CIRCUMFERENCE;
    ring.style.strokeDashoffset = offset;
  }

  function tick() {
    elapsed = Date.now() - startTime;
    const f = formatTime(elapsed);
    timeDisplay.textContent = f.main;
    msDisplay.textContent = f.ms;
    updateRing(elapsed);
    raf = requestAnimationFrame(tick);
  }

  function toggleStart() {
    if (!running) {
      running = true;
      startTime = Date.now() - elapsed;
      if (laps.length === 0) lapStart = startTime;
      btnStart.textContent = 'Pause';
      btnStart.classList.add('running');
      btnLap.disabled = false;
      statusDot.className = 'status-dot running';
      raf = requestAnimationFrame(tick);
    } else {
      running = false;
      cancelAnimationFrame(raf);
      btnStart.textContent = 'Resume';
      btnStart.classList.remove('running');
      statusDot.className = 'status-dot paused';
    }
  }

  function recordLap() {
    if (!running) return;
    const now = Date.now();
    const lapTime = now - lapStart;
    lapStart = now;
    laps.unshift({ num: laps.length + 1, time: lapTime });
    renderLaps();
    updateStats();
  }

  function renderLaps() {
    if (laps.length === 0) {
      lapList.innerHTML = '<div class="lap-empty" id="lap-empty">No laps recorded yet</div>';
      lapCount.textContent = '';
      return;
    }

    const times = laps.map(l => l.time);
    const fastest = Math.min(...times);
    const slowest = Math.max(...times);
    lapCount.textContent = laps.length + ' laps';

    lapList.innerHTML = laps.map((lap, i) => {
      const isFastest = laps.length > 1 && lap.time === fastest;
      const isSlowest = laps.length > 1 && lap.time === slowest;
      const cls = isFastest ? 'lap-item fastest' : isSlowest ? 'lap-item slowest' : 'lap-item';
      const diff = i < laps.length - 1 ? lap.time - laps[i+1].time : 0;
      const diffStr = i < laps.length - 1 ? (diff >= 0 ? '+' : '') + formatLapTime(Math.abs(diff)) : '';
      return '<div class="' + cls + '">' +
        '<span class="lap-num">Lap ' + lap.num + '</span>' +
        '<span class="lap-time">' + formatLapTime(lap.time) + '</span>' +
        '<span class="lap-diff">' + diffStr + '</span>' +
      '</div>';
    }).join('');
  }

  function updateStats() {
    if (laps.length === 0) {
      statLaps.textContent = '0';
      statBest.textContent = '--';
      statAvg.textContent = '--';
      return;
    }
    const times = laps.map(l => l.time);
    statLaps.textContent = laps.length;
    statBest.textContent = formatLapTime(Math.min(...times));
    statAvg.textContent = formatLapTime(times.reduce((a,b) => a+b, 0) / times.length);
  }

  function resetWatch() {
    running = false;
    cancelAnimationFrame(raf);
    elapsed = 0;
    laps = [];
    timeDisplay.textContent = '00:00:00';
    msDisplay.textContent = '.000';
    ring.style.strokeDashoffset = CIRCUMFERENCE;
    btnStart.textContent = 'Start';
    btnStart.classList.remove('running');
    btnLap.disabled = true;
    statusDot.className = 'status-dot';
    renderLaps();
    updateStats();
  }

  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = CIRCUMFERENCE;
</script>
</body>
</html>
